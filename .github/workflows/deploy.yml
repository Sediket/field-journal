name: Deploy Field Journal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate trip JSON files
        run: |
          set -e
          echo "Validating data/trips.json..."
          python3 -c "import json; json.load(open('data/trips.json'))"
          echo "Validating individual trip files..."
          for f in data/trips/*.json; do
            echo "  $f"
            python3 -c "import json; json.load(open('$f'))"
          done
          echo "All JSON valid."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
